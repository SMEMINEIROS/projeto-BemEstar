<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canal de Escuta - Bem-Estar</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        
        /* Estilo das Logos */
        .header-logos { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f0f4f8; padding-bottom: 15px; }
        .header-logos img { max-height: 200px; object-fit: contain; }

        h2 { color: #2c3e50; margin-top: 0; }
        p.desc { color: #7f8c8d; font-size: 0.9em; margin-bottom: 20px; }
        label { display: block; margin: 15px 0 5px; color: #34495e; font-weight: bold; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        textarea { resize: vertical; height: 120px; }
        .checkbox-group { display: flex; align-items: center; background: #e8f8f5; padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #1abc9c; }
        .checkbox-group input { margin-right: 10px; transform: scale(1.2); }
        .checkbox-group label { margin: 0; color: #16a085; cursor: pointer; font-weight: bold; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 20px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        .hidden { display: none; }
        #mensagemSucesso { display: none; background: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin-top: 20px; text-align: center; font-weight: bold; }
        
        /* Ajustes apenas para telas de celular */
        @media (max-width: 600px) {
            .header-logos img { 
                max-height: 70px; /* Tamanho reduzido para celular */
            }
            .header-logos {
                padding-bottom: 10px;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logos">
        <img src="logo-prefeitura.png" alt="Prefeitura Municipal">
        <img src="logo-secretaria.png" alt="Secretaria de Educação">
    </div>

    <h2 id="tituloPagina">Canal de Comunicação Direta</h2>
    <p class="desc" id="descPagina">Espaço seguro e sigiloso gerido pela equipe de Bem-Estar da Secretaria de Educação. Suas demandas psicossociais e sugestões serão analisadas com discrição.</p>

    <div class="checkbox-group">
        <input type="checkbox" id="anonimo">
        <label for="anonimo">Quero enviar meu relato de forma anônima</label>
    </div>

    <form id="formRelato">
        <div id="areaIdentificacao">
            <label for="nome">Nome Completo (Opcional):</label>
            <input type="text" id="nome" placeholder="Digite seu nome">

            <label for="telefone">Telefone / WhatsApp (Opcional):</label>
            <input type="text" id="telefone" placeholder="(00) 00000-0000">
            
            <label for="lotacao">Lotação / Escola (Opcional):</label>
            <input type="text" id="lotacao" placeholder="Onde você atua?">
        </div>

        <label for="categoria">Natureza do Relato:</label>
        <select id="categoria" required>
            <option value="">Selecione uma opção...</option>
        </select>

        <label for="descricao">Descreva a situação:</label>
        <textarea id="descricao" placeholder="Detalhe o ocorrido ou sua sugestão aqui..." required></textarea>

        <button type="submit" id="btnEnviar">Protocolar Relato</button>
    </form>

    <div id="mensagemSucesso">✅ Relato enviado com sucesso! A equipe de Bem-Estar já recebeu sua demanda.</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCehAoG1wErUu78hGVPQudmr0C-B4uIz2o",
        authDomain: "projeto-bemestar-8faeb.firebaseapp.com",
        projectId: "projeto-bemestar-8faeb",
        storageBucket: "projeto-bemestar-8faeb.firebasestorage.app",
        messagingSenderId: "185448860439",
        appId: "1:185448860439:web:27e0ff8d9bcf3723338552"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- LÓGICA DE TEXTOS E CATEGORIAS DINÂMICAS (CMS) ---
    const selectCategoria = document.getElementById('categoria');
    
    // Categorias de segurança caso a internet falhe ou o painel não tenha sido salvo ainda
    const categoriasPadrao = [
        "Demanda Psicossocial", 
        "Sugestão de Melhoria", 
        "Reclamação", 
        "Mediação de Conflito"
    ];

    function popularCategorias(lista) {
        selectCategoria.innerHTML = '<option value="">Selecione uma opção...</option>';
        lista.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            selectCategoria.appendChild(opt);
        });
    }

    async function carregarConfiguracoes() {
        try {
            const docRef = doc(db, "configuracoes", "geral");
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                const dados = docSnap.data();
                
                // Atualiza Título e Descrição
                if(dados.titulo && dados.titulo.trim() !== "") {
                    document.getElementById('tituloPagina').innerText = dados.titulo;
                }
                if(dados.descricao && dados.descricao.trim() !== "") {
                    document.getElementById('descPagina').innerText = dados.descricao;
                }

                // Atualiza as Categorias
                if (dados.categorias && Array.isArray(dados.categorias) && dados.categorias.length > 0) {
                    popularCategorias(dados.categorias);
                } else {
                    popularCategorias(categoriasPadrao); // Se não tiver array de categorias salvo, usa o padrão
                }
            } else {
                popularCategorias(categoriasPadrao); // Se não existir o documento 'geral' ainda, usa o padrão
            }
        } catch (error) {
            console.log("Erro ao carregar do Firebase. Usando textos padrão da página.", error);
            popularCategorias(categoriasPadrao);
        }
    }
    
    // Inicia a busca das configurações ao carregar a página
    carregarConfiguracoes();

    // --- LÓGICA DO FORMULÁRIO ---
    const chkAnonimo = document.getElementById('anonimo');
    const areaIdentificacao = document.getElementById('areaIdentificacao');
    
    chkAnonimo.addEventListener('change', (e) => {
        if(e.target.checked) {
            areaIdentificacao.classList.add('hidden');
            document.getElementById('nome').value = '';
            document.getElementById('telefone').value = '';
            document.getElementById('lotacao').value = '';
        } else {
            areaIdentificacao.classList.remove('hidden');
        }
    });

    document.getElementById('formRelato').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.innerText = "Enviando...";
        btn.disabled = true;

        const isAnonimo = chkAnonimo.checked;
        const dados = {
            anonimo: isAnonimo,
            nome: isAnonimo ? "Anônimo" : document.getElementById('nome').value || "Não informado",
            telefone: isAnonimo ? "Não informado" : document.getElementById('telefone').value || "Não informado",
            lotacao: isAnonimo ? "Não informada" : document.getElementById('lotacao').value || "Não informada",
            categoria: document.getElementById('categoria').value,
            descricao: document.getElementById('descricao').value,
            status: "Novo Pedido",
            dataEnvio: serverTimestamp()
        };

        try {
            await addDoc(collection(db, "relatos"), dados);
            document.getElementById('formRelato').style.display = 'none';
            document.getElementById('mensagemSucesso').style.display = 'block';
        } catch (error) {
            console.error("Erro:", error);
            alert("Erro ao enviar. Tente novamente.");
            btn.innerText = "Protocolar Relato";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
